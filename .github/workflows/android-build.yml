name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies (skip electron postinstall)
        run: npm install --ignore-scripts

      - name: Create .env file for build
        run: |
          echo "VITE_SUPABASE_URL=https://ctweznwsyyoryifpvzlv.supabase.co" >> .env
          echo "VITE_SUPABASE_ANON_KEY=sb_publishable_KoruL_UGpaofPSKfg5bebQ_iMIZO1Qs" >> .env
          echo "VITE_GEMINI_API_KEY=AIzaSyCEIJc1i9j5sV14KJ6GyW22VosknVg944Y" >> .env

      - name: Build Web App
        run: npx vite build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Capacitor Sync
        run: npx cap sync android

      - name: Build APK
        working-directory: ./android
        run: chmod +x gradlew && ./gradlew assembleDebug

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk VAYNA-Android.apk

      - name: Create or Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          name: "VAYNA Android - Dernière version"
          body: "Téléchargez la dernière version de VAYNA pour Android. Installée automatiquement à chaque mise à jour."
          prerelease: false
          files: VAYNA-Android.apk
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VAYNA-Android
          path: VAYNA-Android.apk
